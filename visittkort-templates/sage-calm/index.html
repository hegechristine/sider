<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linnea Kvalheim — Digitalt visittkort</title>
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #AFBEA0;
    --sage-light: #D2DCC3;
    --sage-pale: #E8EFDF;
    --cream: #F8F4EB;
    --olive: #3A4030;
    --olive-soft: #5C6450;
    --sand: #F0D9A8;
    --rust-muted: #B07A5A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--sage);
    color: var(--olive);
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .serif { font-family: 'Cormorant', serif; }
  .italic { font-family: 'Cormorant', serif; font-style: italic; }
  .kicker {
    font-family: 'Inter', sans-serif; font-weight: 500;
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.22em;
  }
  .page { max-width: 560px; margin: 0 auto; padding: 40px 24px 60px; text-align: center; }

  .photo-wrap {
    width: 150px; height: 150px;
    margin: 0 auto 24px;
    border-radius: 50%;
    overflow: hidden;
    background: var(--cream);
    padding: 6px;
  }
  .photo-wrap-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    overflow: hidden;
  }
  .photo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

  h1.name {
    font-family: 'Cormorant', serif; font-style: italic;
    font-weight: 500;
    font-size: 3rem; line-height: 0.95;
    color: var(--olive);
    margin-bottom: 4px;
  }
  .surname {
    font-family: 'Cormorant', serif; font-weight: 400;
    font-size: 1.35rem;
    color: var(--olive);
  }

  .ornament {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin: 18px 0 14px;
  }
  .ornament-line { width: 50px; height: 1px; background: var(--sand); }
  .ornament-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--sand); }

  .tagline-kicker {
    color: var(--olive); margin-bottom: 8px;
  }
  .location {
    font-family: 'Cormorant', serif; font-style: italic;
    font-size: 0.95rem; color: var(--olive-soft);
    margin-bottom: 28px;
  }

  /* Save actions */
  .save-actions {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 0 0 12px;
  }
  .save-contact, .save-image {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 10px;
    border: 1.5px solid var(--olive);
    border-radius: 999px;
    background: var(--olive); color: var(--cream);
    font-family: 'Inter', sans-serif; font-weight: 600;
    font-size: 0.82rem; letter-spacing: 0.04em;
    cursor: pointer; text-decoration: none;
  }
  .save-image { background: transparent; color: var(--olive); }
  .save-contact svg, .save-image svg { width: 15px; height: 15px; }
  .save-contact:hover { background: var(--olive-soft); }
  .save-image:hover { background: var(--olive); color: var(--cream); }

  /* Quick actions */
  .actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 8px; }
  .action-btn {
    background: var(--cream); color: var(--olive); text-decoration: none;
    padding: 13px 8px;
    border-radius: 8px;
    border: 1px solid rgba(58, 64, 48, 0.15);
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    font-family: 'Inter', sans-serif; font-weight: 500;
    font-size: 0.7rem;
    cursor: pointer;
  }
  .action-btn:hover { background: var(--cream); border-color: var(--olive); }
  .action-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* Socials */
  .socials { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 6px; }
  .social-btn {
    background: transparent; color: var(--olive); text-decoration: none;
    padding: 11px 8px;
    border: 1px solid rgba(58, 64, 48, 0.25);
    border-radius: 999px;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    font-family: 'Inter', sans-serif; font-weight: 500;
    font-size: 0.78rem;
  }
  .social-btn:hover { background: var(--olive); color: var(--cream); border-color: var(--olive); }
  .social-btn svg { width: 13px; height: 13px; fill: currentColor; }

  /* Featured links — diskret, ikke pill */
  .featured-links {
    margin-top: 32px;
    text-align: left;
    border-top: 1px solid rgba(58, 64, 48, 0.2);
    padding-top: 22px;
  }
  .featured-kicker {
    color: var(--rust-muted);
    margin-bottom: 10px;
    text-align: center;
  }
  .link-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 14px 0;
    border-bottom: 1px solid rgba(58, 64, 48, 0.12);
    text-decoration: none;
    color: var(--olive);
  }
  .link-row:last-child { border-bottom: none; }
  .link-row:hover .link-label { color: var(--rust-muted); }
  .link-label {
    font-family: 'Cormorant', serif;
    font-size: 1.2rem;
    transition: color 0.18s ease;
  }
  .link-arrow {
    font-family: 'Inter', sans-serif;
    color: var(--olive-soft);
    font-size: 1rem;
  }

  /* Form */
  .exchange {
    margin-top: 36px;
    background: var(--cream);
    padding: 28px 22px;
    border-radius: 12px;
    text-align: left;
  }
  .exchange-kicker { color: var(--rust-muted); margin-bottom: 6px; }
  .exchange h2 {
    font-family: 'Cormorant', serif; font-style: italic;
    font-weight: 500;
    font-size: 1.8rem; line-height: 1.1;
    color: var(--olive);
    margin-bottom: 6px;
  }
  .exchange-sub {
    font-family: 'Cormorant', serif; font-style: italic;
    font-size: 0.98rem;
    color: var(--olive-soft);
    margin-bottom: 20px;
  }
  .vk-form { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .vk-form input, .vk-form textarea {
    background: var(--bg, #fff); color: var(--olive);
    border: 1px solid rgba(58, 64, 48, 0.18);
    border-radius: 8px;
    padding: 12px 14px; font-family: 'Inter', sans-serif;
    font-size: 0.92rem; width: 100%; box-sizing: border-box;
  }
  .vk-form textarea { grid-column: 1 / -1; min-height: 70px; resize: vertical; }
  .vk-form .full { grid-column: 1 / -1; }
  .vk-form button {
    background: var(--olive); color: var(--cream);
    border: none; padding: 14px;
    border-radius: 999px;
    font-family: 'Inter', sans-serif; font-weight: 600;
    font-size: 0.92rem;
    cursor: pointer; width: 100%; grid-column: 1 / -1;
  }
  .vk-form button:hover { background: var(--olive-soft); }

  @media (max-width: 480px) {
    h1.name { font-size: 2.3rem; }
    .save-actions { grid-template-columns: 1fr; }
    .vk-form { grid-template-columns: 1fr; }
  }

  .template-banner {
    background: var(--olive); color: var(--sand);
    padding: 10px 20px; text-align: center;
    font-family: 'Inter', sans-serif; font-size: 0.68rem;
    letter-spacing: 0.22em; text-transform: uppercase;
  }
  .template-banner span { color: var(--cream); }
</style>
</head>
<body>
<div class="template-banner">Template: <span>Sage Calm</span></div>

  <section class="exchange">

    <form class="vk-form">
