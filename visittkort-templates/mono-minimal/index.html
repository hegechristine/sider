<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tobias Strand — Digitalt visittkort</title>
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF8;
    --ink: #181816;
    --ink-soft: #66665E;
    --line: rgba(24, 24, 22, 0.10);
    --accent: #4A6FA5;
    --accent-deep: #355886;
    --dark: #1C1C1C;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2 { font-family: 'Archivo Black', sans-serif; font-weight: 900; letter-spacing: -0.02em; line-height: 1; }
  .kicker {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600; font-size: 0.7rem;
    text-transform: uppercase; letter-spacing: 0.18em;
  }
  .page { max-width: 600px; margin: 0 auto; padding: 32px 24px 60px; }

  .card {
    background: var(--bg);
    border-top: 2px solid var(--ink);
    border-bottom: 2px solid var(--ink);
    padding: 28px 0;
    margin-bottom: 32px;
  }
  .card-top { display: flex; gap: 22px; align-items: flex-start; }
  .photo {
    width: 110px; height: 110px;
    border: 2px solid var(--ink);
    overflow: hidden; flex-shrink: 0;
  }
  .photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .meta { padding-top: 4px; flex: 1; min-width: 0; }
  .first-kicker { color: var(--accent); margin-bottom: 4px; }
  .last-name { font-size: 2.4rem; }
  .divider-thin { height: 1px; background: var(--ink); margin: 16px 0 12px; width: 50%; }
  .role-line { color: var(--ink-soft); }
  .tagline {
    font-size: 1.1rem; font-weight: 500; line-height: 1.35;
    margin-top: 20px;
  }

  .save-actions {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 26px;
  }
  .save-contact, .save-image {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 15px 10px; border: none;
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
    font-size: 0.74rem; letter-spacing: 0.13em; text-transform: uppercase;
    cursor: pointer; text-decoration: none; line-height: 1;
  }
  .save-contact { background: var(--accent); color: var(--bg); }
  .save-image { background: var(--ink); color: var(--bg); }
  .save-contact:hover { background: var(--accent-deep); }
  .save-image:hover { background: #000; }
  .save-contact svg, .save-image svg { width: 16px; height: 16px; flex-shrink: 0; }

  .actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 8px; }
  .action-btn {
    background: var(--ink); color: var(--bg); text-decoration: none;
    padding: 14px 8px; border: none;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
    font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase;
    cursor: pointer;
  }
  .action-btn:hover { background: var(--accent); }
  .action-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .socials { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 6px; }
  .social-btn {
    background: transparent; color: var(--ink); text-decoration: none;
    padding: 12px 8px; border: 1.5px solid var(--ink);
    display: flex; align-items: center; justify-content: center; gap: 7px;
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
    font-size: 0.66rem; letter-spacing: 0.14em; text-transform: uppercase;
  }
  .social-btn:hover { background: var(--ink); color: var(--bg); }
  .social-btn svg { width: 14px; height: 14px; fill: currentColor; }

  /* Featured links — diskret rad, ikke pill */
  .featured-links {
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--ink);
  }
  .featured-kicker {
    color: var(--accent);
    margin-bottom: 8px;
  }
  .link-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid var(--line);
    text-decoration: none;
    color: var(--ink);
  }
  .link-row:last-child { border-bottom: none; }
  .link-row:hover .link-label { color: var(--accent); }
  .link-label {
    font-family: 'Inter', sans-serif; font-weight: 500;
    font-size: 1rem;
    transition: color 0.18s ease;
  }
  .link-arrow {
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink-soft);
    font-size: 0.85rem;
  }

  /* Form section */
  .exchange {
    margin-top: 40px;
    background: var(--ink);
    color: var(--bg);
    padding: 28px 24px;
  }
  .exchange-kicker { color: var(--accent); margin-bottom: 12px; }
  .exchange h2 {
    font-family: 'Inter', sans-serif; font-weight: 700;
    font-size: 1.45rem; letter-spacing: -0.01em; line-height: 1.15;
    margin-bottom: 8px;
  }
  .exchange-sub { font-size: 0.95rem; color: rgba(250, 250, 248, 0.72); margin-bottom: 22px; }
  .vk-form {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .vk-form input, .vk-form textarea {
    background: var(--bg); color: var(--ink);
    border: 1px solid transparent;
    padding: 12px 14px; font-family: 'Inter', sans-serif;
    font-size: 0.92rem; width: 100%; box-sizing: border-box;
  }
  .vk-form textarea { grid-column: 1 / -1; min-height: 70px; resize: vertical; }
  .vk-form .full { grid-column: 1 / -1; }
  .vk-form button {
    background: var(--accent); color: var(--bg);
    border: none; padding: 14px;
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
    font-size: 0.78rem; letter-spacing: 0.16em; text-transform: uppercase;
    cursor: pointer; width: 100%; grid-column: 1 / -1;
  }
  .vk-form button:hover { background: var(--accent-deep); }

  @media (max-width: 480px) {
    .last-name { font-size: 1.8rem; }
    .photo { width: 90px; height: 90px; }
    .save-actions { grid-template-columns: 1fr; }
    .vk-form { grid-template-columns: 1fr; }
  }

  .template-banner {
    background: var(--ink); color: var(--bg);
    padding: 10px 20px; text-align: center;
    font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
    letter-spacing: 0.16em; text-transform: uppercase;
  }
  .template-banner span { color: var(--accent); }
</style>
</head>
<body>
<div class="template-banner">Template: <span>Mono Minimal</span></div>
<main class="page">
  <section class="card">
    <div class="card-top">
      <div class="photo">
        <img src="profile-placeholder.png" alt="Tobias Strand">
      </div>
      <div class="meta">
        <div class="kicker first-kicker">TOBIAS</div>
        <h1 class="last-name">Strand</h1>
        <div class="divider-thin"></div>
        <div class="kicker role-line">FULL-STACK DEVELOPER · OSLO</div>
        <p class="tagline">Bygger verktøy for norske bedrifter.</p>
      </div>
    </div>

    <div class="save-actions">
      <button type="button" class="save-contact">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Lagre kontakt
      </button>
      <button type="button" class="save-image">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Last ned info
      </button>
    </div>

    <div class="actions">
      <a href="mailto:tobias@strand.dev" class="action-btn">
        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        E-post
      </a>
      <a href="tel:+4790512678" class="action-btn">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        Ring
      </a>
      <a href="https://strand.dev" class="action-btn">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        Web
      </a>
      <button type="button" class="action-btn">
        <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        Del
      </button>
    </div>

    <div class="socials">
      <a href="#" class="social-btn"><svg viewBox="0 0 24 24"><path d="M12 2.16c3.2 0 3.58 0 4.85.07 1.17.05 1.81.25 2.23.41.56.22.96.48 1.38.9.42.42.68.82.9 1.38.16.42.36 1.06.41 2.23.06 1.27.07 1.65.07 4.85s0 3.58-.07 4.85c-.05 1.17-.25 1.81-.41 2.23-.22.56-.48.96-.9 1.38a3.7 3.7 0 0 1-1.38.9c-.42.16-1.06.36-2.23.41-1.27.06-1.65.07-4.85.07s-3.58 0-4.85-.07c-1.17-.05-1.81-.25-2.23-.41a3.7 3.7 0 0 1-1.38-.9 3.7 3.7 0 0 1-.9-1.38c-.16-.42-.36-1.06-.41-2.23C2.18 15.58 2.16 15.2 2.16 12s0-3.58.07-4.85c.05-1.17.25-1.81.41-2.23.22-.56.48-.96.9-1.38.42-.42.82-.68 1.38-.9.42-.16 1.06-.36 2.23-.41C8.42 2.18 8.8 2.16 12 2.16zm0 3.84a6 6 0 1 0 0 12 6 6 0 0 0 0-12zm0 9.84a3.84 3.84 0 1 1 0-7.68 3.84 3.84 0 0 1 0 7.68zm6.41-11.55a1.44 1.44 0 1 0 0 2.88 1.44 1.44 0 0 0 0-2.88z"/></svg>IG</a>
      <a href="#" class="social-btn"><svg viewBox="0 0 24 24"><path d="M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.36V9h3.41v1.56h.05a3.74 3.74 0 0 1 3.36-1.85c3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.55C0 23.22.79 24 1.77 24h20.45C23.21 24 24 23.22 24 22.27V1.72C24 .77 23.21 0 22.22 0z"/></svg>IN</a>
      <a href="#" class="social-btn"><svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>GH</a>
      <a href="#" class="social-btn"><svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>YT</a>
    </div>
  </section>

  <section class="exchange">
    <div class="kicker exchange-kicker">— UTVEKSLING</div>
    <h2>Send meg din info</h2>
    <p class="exchange-sub">Fyll inn under, så får jeg den rett i innboksen.</p>
    <form class="vk-form">
      <input type="text" placeholder="Navn" required>
      <input type="email" placeholder="E-post" required>
      <input type="text" placeholder="Bedrift (valgfritt)" class="full">
      <input type="tel" placeholder="Telefon (valgfritt)" class="full">
      <textarea placeholder="Melding (valgfritt)"></textarea>
      <button type="submit">Send →</button>
    </form>
  </section>
</main>
</body>
</html>
