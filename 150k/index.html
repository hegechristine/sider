<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,follow">
<title>150K Business Challenge — Hege Christine</title>
<meta name="description" content="3-dagers live challenge for digitale gründere, eksperter og fagpersoner. Skriv inn e-posten din for å se detaljene.">

<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;800&family=JetBrains+Mono:wght@500;600&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;800&family=JetBrains+Mono:wght@500;600&display=swap"></noscript>

<style>
:root {
  --cream: #EFE6D4;
  --ink: #2E3230;
  --rust: #C5522C;
  --olive: #5E5F4C;
  --line-on-cream: rgba(46, 50, 48, 0.16);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Archivo', sans-serif;
  font-size: 16px;
  line-height: 1.45;
  color: var(--ink);
  background-color: var(--cream);
  background-image:
    linear-gradient(rgba(46,50,48,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(46,50,48,0.05) 1px, transparent 1px);
  background-size: 80px 80px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  position: relative;
}

body::before, body::after {
  content: "+";
  position: fixed;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  font-size: 16px;
  color: var(--ink);
  opacity: 0.35;
  line-height: 1;
}
body::before { top: 32px; left: 32px; }
body::after  { top: 32px; right: 32px; }

.frame {
  width: 100%;
  max-width: 460px;
  text-align: center;
}

.logo-mark {
  width: 44px; height: 44px;
  background: var(--ink);
  color: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Archivo', sans-serif;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 0.02em;
  margin: 0 auto 36px;
}

.eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--rust);
  display: inline-flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 22px;
}
.eyebrow::before, .eyebrow::after {
  content: "";
  width: 18px;
  height: 1px;
  background: currentColor;
}

h1 {
  font-family: 'Archivo', sans-serif;
  font-weight: 800;
  font-size: clamp(34px, 6vw, 48px);
  line-height: 0.98;
  letter-spacing: -0.03em;
  color: var(--ink);
  margin-bottom: 18px;
}

h1 .accent { color: var(--rust); }

.lead {
  font-family: 'Archivo', sans-serif;
  font-size: 16px;
  line-height: 1.5;
  color: var(--olive);
  margin-bottom: 32px;
  max-width: 38ch;
  margin-left: auto;
  margin-right: auto;
}

/* FORM */
.hc-kajabi-form {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  text-align: left;
}

.hc-kajabi-form input[type="text"],
.hc-kajabi-form input[type="email"] {
  width: 100%;
  font-family: 'Archivo', sans-serif;
  font-size: 15px;
  line-height: 1.4;
  color: var(--ink);
  background: #FBF8F0;
  border: 1.5px solid var(--ink);
  border-radius: 3px;
  padding: 14px 16px;
  transition: border-color 0.18s ease, box-shadow 0.18s ease;
}

.hc-kajabi-form input::placeholder { color: rgba(46, 50, 48, 0.5); }

.hc-kajabi-form input:focus {
  outline: none;
  border-color: var(--rust);
  box-shadow: 3px 3px 0 var(--ink);
}

.hc-kajabi-form button {
  width: 100%;
  cursor: pointer;
  background: var(--ink);
  color: var(--cream);
  font-family: 'Archivo', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: 1.5px solid var(--ink);
  border-radius: 3px;
  padding: 16px 22px;
  margin-top: 4px;
  transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.15s ease;
}

.hc-kajabi-form button:hover:not(:disabled) {
  background: var(--rust);
  transform: translate(-1px, -1px);
  box-shadow: 3px 3px 0 var(--ink);
}

.hc-kajabi-form button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.hc-kajabi-form [data-form-message] {
  min-height: 1em;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: center;
  margin-top: 4px;
}

.hc-kajabi-form [data-form-message][data-state="success"] { color: var(--rust); }
.hc-kajabi-form [data-form-message][data-state="error"]   { color: #B33A1F; }

.fineprint {
  margin-top: 22px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--olive);
  opacity: 0.85;
}

/* Skjul Kajabi-embed og response-iframe */
.kajabi-hidden-wrap {
  position: absolute;
  left: -9999px;
  top: -9999px;
  visibility: hidden;
  pointer-events: none;
}

.kajabi-response-frame { display: none; }

@media (max-width: 480px) {
  body::before, body::after { font-size: 14px; }
  body::before { top: 20px; left: 20px; }
  body::after  { top: 20px; right: 20px; }
}
</style>
</head>
<body>

<main class="frame">
  <div class="logo-mark">HC</div>

  <span class="eyebrow">3-dagers live challenge</span>

  <h1>3 dager. Et system. <span class="accent">150K</span> i måneden.</h1>

  <p class="lead">Legg igjen navn og e-post for flere detaljer i neste steg.</p>

  <form id="signup-form" class="hc-kajabi-form"
        data-kajabi-form-id="2149575768"
        data-redirect-url="/150k-challenge-altB/">
    <input type="text" name="name" placeholder="Fornavn" required autocomplete="given-name">
    <input type="email" name="email" placeholder="E-post" required autocomplete="email">
    <button type="submit">Vis meg detaljene →</button>
    <div class="form-message" data-form-message></div>
  </form>

  <p class="fineprint">26.–28. mai 2026 · Live på Zoom</p>

  <!-- Skjult Kajabi-embed (genererer authenticity_token) -->
  <div class="kajabi-hidden-wrap" aria-hidden="true">
    <script src="https://www.hegechristine.no/forms/2149575768/embed.js"></script>
  </div>

  <!-- Skjult iframe for response -->
  <iframe name="kajabi-response-frame" class="kajabi-response-frame" aria-hidden="true"></iframe>
</main>

<!-- KAJABI FORM-INTEGRASJON -->
<script>
(function() {
  const forms = document.querySelectorAll('.hc-kajabi-form');
  forms.forEach(initKajabiForm);

  function initKajabiForm(customForm) {
    const button = customForm.querySelector('button[type="submit"]');
    const message = customForm.querySelector('[data-form-message]');
    const originalButtonText = button.textContent;
    const redirectUrl = customForm.getAttribute('data-redirect-url');
    const successMessage = customForm.getAttribute('data-success-message')
      || '✓ Takk! Du er på listen.';

    function setMessage(text, state) {
      if (!message) return;
      message.textContent = text;
      message.setAttribute('data-state', state || '');
    }

    function findKajabiForm() {
      return document.querySelector('#kajabi-form form, .kajabi-hidden-wrap form');
    }

    customForm.addEventListener('submit', function(e) {
      e.preventDefault();

      const kajabiForm = findKajabiForm();

      if (!kajabiForm) {
        setMessage('Skjemaet laster fortsatt — prøv igjen om et øyeblikk.', 'error');
        return;
      }

      button.disabled = true;
      button.textContent = 'Sender...';
      setMessage('');

      const userName = customForm.querySelector('input[name="name"]').value.trim();
      const userEmail = customForm.querySelector('input[name="email"]').value.trim();

      const emailInput = kajabiForm.querySelector('input[type="email"]');
      if (emailInput) emailInput.value = userEmail;

      const textInputs = kajabiForm.querySelectorAll('input[type="text"]');
      for (let i = 0; i < textInputs.length; i++) {
        const inp = textInputs[i];
        if (inp.name && inp.name.toLowerCase().indexOf('name') !== -1) {
          inp.value = userName;
          break;
        }
      }

      kajabiForm.target = 'kajabi-response-frame';

      try {
        kajabiForm.submit();

        setTimeout(function() {
          if (redirectUrl) {
            const url = new URL(redirectUrl, window.location.origin);
            if (userName) url.searchParams.set('name', userName);
            if (userEmail) url.searchParams.set('email', userEmail);
            window.location.href = url.toString();
          } else {
            setMessage(successMessage, 'success');
            customForm.reset();
            button.disabled = false;
            button.textContent = originalButtonText;
          }
        }, 800);
      } catch (err) {
        setMessage('Noe gikk galt. Prøv igjen om litt.', 'error');
        button.disabled = false;
        button.textContent = originalButtonText;
      }
    });
  }
})();
</script>

<script defer src="/edit.js"></script>
</body>
</html>
