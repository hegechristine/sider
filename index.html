<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hege Christine</title>
  <meta name="description" content="Hege Christine">
  <meta name="robots" content="noindex,follow">
  <meta http-equiv="refresh" content="2; url=https://www.hegechristine.no">
  <link rel="canonical" href="https://www.hegechristine.no">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Newsreader:ital,wght@1,400;1,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --olive-500: #76775F;
      --olive-600: #5E5F4C;
      --cream-50:  #FBF8F0;
      --cream-200: #EFE6D4;
      --rust-400:  #C5522C;
      --ink-600:   #2E3230;
      --grid-line: rgba(46, 50, 48, 0.08);
      --font-display: 'Archivo', system-ui, sans-serif;
      --font-editorial: 'Newsreader', 'Times New Roman', serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--cream-200);
      color: var(--ink-600);
      font-family: var(--font-display);
      display: grid;
      place-items: center;
      padding: 2rem;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 48px 48px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    main {
      max-width: 640px;
      text-align: center;
    }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--olive-600);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }
    .eyebrow::before {
      content: "";
      width: 36px;
      height: 2px;
      background: var(--rust-400);
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.04em;
      margin: 0 0 1.5rem;
    }
    h1 em {
      font-family: var(--font-editorial);
      font-style: italic;
      font-weight: 500;
      color: var(--rust-400);
      letter-spacing: -0.01em;
    }
    p {
      font-family: var(--font-editorial);
      font-style: italic;
      font-size: clamp(1.125rem, 2.5vw, 1.5rem);
      line-height: 1.5;
      color: var(--olive-600);
      margin: 0 0 2.5rem;
    }
    a {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-600);
      text-decoration: none;
      border-bottom: 2px solid var(--rust-400);
      padding-bottom: 4px;
      transition: color 140ms ease;
    }
    a:hover { color: var(--rust-400); }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">hegechristine.no</div>
    <h1>Sender deg <em>videre</em></h1>
    <a href="https://www.hegechristine.no">hegechristine.no →</a>
  </main>
</body>
</html>
